<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <!-- Grid lines -->
  <line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff08" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="450" stroke="#ffffff08" stroke-width="1"/>
  <!-- Circuit board lines -->
  <path d="M 50 200 L 150 200 L 150 150 L 250 150" stroke="#00d4ff30" stroke-width="2" fill="none"/>
  <path d="M 550 300 L 650 300 L 650 250 L 750 250" stroke="#00d4ff30" stroke-width="2" fill="none"/>
  <circle cx="150" cy="200" r="4" fill="#00d4ff40"/>
  <circle cx="650" cy="300" r="4" fill="#00d4ff40"/>
  <!-- Monitor icon -->
  <rect x="280" y="110" width="240" height="160" rx="12" fill="none" stroke="#4fc3f7" stroke-width="3"/>
  <rect x="295" y="125" width="210" height="130" rx="6" fill="#0a1628"/>
  <!-- Code on screen -->
  <text x="310" y="155" font-family="monospace" font-size="14" fill="#4fc3f7">&lt;AI/&gt;</text>
  <rect x="310" y="165" width="80" height="6" rx="3" fill="#4fc3f750"/>
  <rect x="310" y="178" width="120" height="6" rx="3" fill="#7c4dff50"/>
  <rect x="310" y="191" width="60" height="6" rx="3" fill="#4fc3f750"/>
  <rect x="310" y="204" width="100" height="6" rx="3" fill="#7c4dff50"/>
  <rect x="310" y="217" width="80" height="6" rx="3" fill="#4fc3f550"/>
  <!-- Monitor stand -->
  <rect x="388" y="270" width="24" height="30" rx="4" fill="#4fc3f7"/>
  <rect x="360" y="295" width="80" height="8" rx="4" fill="#4fc3f7"/>
  <!-- Gear icon right -->
  <circle cx="580" cy="190" r="28" fill="none" stroke="#7c4dff" stroke-width="3"/>
  <circle cx="580" cy="190" r="14" fill="#7c4dff40" stroke="#7c4dff" stroke-width="2"/>
  <rect x="576" y="155" width="8" height="14" rx="4" fill="#7c4dff"/>
  <rect x="576" y="211" width="8" height="14" rx="4" fill="#7c4dff"/>
  <rect x="555" y="186" width="14" height="8" rx="4" fill="#7c4dff"/>
  <rect x="611" y="186" width="14" height="8" rx="4" fill="#7c4dff"/>
  <!-- Label -->
  <rect x="240" y="340" width="320" height="48" rx="24" fill="url(#accent)" opacity="0.9"/>
  <text x="400" y="371" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">TECH</text>
</svg>
