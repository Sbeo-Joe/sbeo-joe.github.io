<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#2d1515"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f0000"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <!-- Decorative columns -->
  <rect x="100" y="170" width="20" height="160" rx="4" fill="#ef535020"/>
  <rect x="150" y="140" width="20" height="190" rx="4" fill="#ef535020"/>
  <rect x="630" y="140" width="20" height="190" rx="4" fill="#ef535020"/>
  <rect x="680" y="170" width="20" height="160" rx="4" fill="#ef535020"/>
  <!-- Capitol dome -->
  <ellipse cx="400" cy="185" rx="120" ry="70" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <path d="M 280 185 Q 400 80 520 185" fill="#ef535015" stroke="#ef5350" stroke-width="2.5"/>
  <!-- Building body -->
  <rect x="300" y="185" width="200" height="120" fill="#ef535015" stroke="#ef5350" stroke-width="2"/>
  <!-- Columns on building -->
  <rect x="320" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="345" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="370" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="395" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="420" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="445" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <rect x="470" y="195" width="10" height="110" rx="3" fill="#ef535040"/>
  <!-- Steps -->
  <rect x="270" y="305" width="260" height="12" rx="2" fill="#ef535030"/>
  <rect x="255" y="317" width="290" height="10" rx="2" fill="#ef535025"/>
  <!-- Flag pole -->
  <line x1="400" y1="115" x2="400" y2="185" stroke="#ef5350" stroke-width="2"/>
  <!-- Flag -->
  <rect x="400" y="115" width="40" height="25" fill="#ef5350" rx="2"/>
  <line x1="408" y1="120" x2="440" y2="120" stroke="white" stroke-width="1.5"/>
  <line x1="408" y1="127" x2="440" y2="127" stroke="white" stroke-width="1.5"/>
  <line x1="408" y1="134" x2="440" y2="134" stroke="white" stroke-width="1.5"/>
  <!-- Stars on flag -->
  <text x="401" y="133" font-size="8" fill="white">★★★</text>
  <!-- Label -->
  <rect x="240" y="355" width="320" height="48" rx="24" fill="url(#accent)" opacity="0.9"/>
  <text x="400" y="386" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">POLITICS</text>
</svg>
