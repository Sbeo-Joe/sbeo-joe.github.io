{{/* Language switcher */}}
<div class="lang-switcher">
  <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')" title="한국어">KO</button>
  <button class="lang-btn" data-lang="en" onclick="switchLang('en')" title="English">EN</button>
  <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')" title="日本語">JP</button>
</div>

<div class="menu-links">
  <a href="{{ .Site.Params.social.instagram }}" target="_blank" id="instagram-link" title="Instagram" {{ if not .Site.Params.social.instagram }}class="disabled"{{ end }}>
    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="vertical-align:-0.125em">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
    </svg>
  </a>

  <a href="{{ "categories/" | absURL }}" id="categories-link" title="Categories">
    <i class="icon-folder"></i>
  </a>

  <a href="{{ "tags/" | absURL }}" id="tags-link" title="Tags">
    <i class="icon-tags"></i>
  </a>

  <button class="dark-mode-toggle" id="theme-toggle-button" aria-label="Toggle color scheme">
    <i class="icon-moon"></i>
  </button>
</div>

<script>
function switchLang(lang) {
  localStorage.setItem('site-language', lang);
  var sel = document.getElementById('i18n-selector');
  if (sel) {
    sel.value = lang;
    sel.dispatchEvent(new Event('change'));
  }
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  var lang = localStorage.getItem('site-language') || '{{ .Site.Language.Lang }}';
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
});
</script>
